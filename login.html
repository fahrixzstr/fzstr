<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login - FahriXZ Store</title>
</head>
<body>
  <h1>Login FahriXZ Store</h1>
  <form id="loginForm">
    <label>Username</label><br />
    <input type="text" id="username" required /><br />
    <label>Password</label><br />
    <input type="password" id="password" required /><br />
    <label>Login sebagai</label><br />
    <select id="loginType" required>
      <option value="user">User</option>
      <option value="admin">Admin</option>
    </select><br />
    <button type="submit">Login</button>
  </form>
  <div id="loginMessage" style="color:red;margin-top:10px;"></div>

  <script>
    const credentials = {
      user: { username:'user', password:'userpass' },
      admin: { username:'admin', password:'adminpass' }
    };
    document.getElementById('loginForm').addEventListener('submit', function(e){
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const loginType = document.getElementById('loginType').value;
      const cred = credentials[loginType];
      if(cred && username === cred.username && password === cred.password) {
        localStorage.setItem('fahrixz_login', JSON.stringify({
          username, role: loginType, loggedIn: true
        }));
        if(loginType === 'admin') window.location.href = 'admin.html';
        else window.location.href = 'index.html';
      } else {
        document.getElementById('loginMessage').textContent = 'Username atau password salah!';
      }
    });
  </script>
</body>
</html>
