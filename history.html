<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riwayat Order - FahriXZ Store</title>
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
</head>

<body>
  <div class="dashboard">
    <aside class="sidebar">
      <h2>⚡ FahriXZ</h2>
      <a href="user.html">🏠 Dashboard</a>
      <a href="#" class="active">📦Riwayat</a>
      <a href="wallet.html">💰 Wallet</a>
      <a href="settings.html">⚙ Pengaturan</a>
    </aside>

    <main class="content">
      <h1>📦 Riwayat Pesanan</h1>
      <div id="historyContainer"></div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDjSUSuUWl6GOh_vJ-GnYV1tvguv0_pRXI",
      authDomain: "fahrixzstore.firebaseapp.com",
      databaseURL: "https://fahrixzstore-default-rtdb.firebaseio.com",
      projectId: "fahrixzstore"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const orderRef = ref(db, 'orders');
    onValue(orderRef, snapshot => {
      const data = snapshot.val();
      const container = document.getElementById('historyContainer');
      
      if (!data) {
        container.innerHTML = '<div class="order-card"><p>Belum ada pesanan</p></div>';
        return;
      }

      let html = '';
      for (let id in data) {
        const item = data[id];
        const statusColor = item.status === 'Selesai' ? '#22c55e' : item.status === 'Diproses' ? '#667eea' : '#f59e0b';
        html += `
          <div class="order-card">
            <h3>${item.product}</h3>
            <p>Order ID: ${item.orderId}</p>
            <p>Nama: ${item.name}</p>
            <span style="background:${statusColor};color:#000;padding:5px 12px;border-radius:20px;font-size:12px;">${item.status}</span>
          </
