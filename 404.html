<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Halaman tidak ditemukan - FahriXZ Store">
  <title>404 - FahriXZ Store</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap">
  
  <style>
    body{
      margin:0;
      padding:0;
      font-family:'Poppins',sans-serif;
      background:linear-gradient(135deg,#0a0a0f 0%,#12121a 100%);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:#fff;
    }
    .notfound-page{text-align:center;}
    .notfound-page h1{
      font-size:150px;
      color:#00d9ff;
      text-shadow:0 0 50px rgba(0,217,255,0.5);
      animation:shake .5s ease-in-out;
    }
    .notfound-page p{font-size:1.5rem;color:#a0a0b0;margin-bottom:30px;}
    .btn-primary{
      display:inline-block;
      padding:15px 35px;
      background:linear-gradient(135deg,#00d9ff,#00a8cc);
      color:#000;
      font-weight:700;
      border-radius:50px;
      text-decoration:none;
    }
    @keyframes shake{
      0%,100%{transform:translateX(0)}
      25%{transform:translateX(-10px)}
      75%{transform:translateX(10px)}
    }
  </style>
</head>
<body>
  <div class="notfound-page">
    <h1>404</h1>
    <p>Halaman yang kamu cari tidak ditemukan 😢</p>
    <a href="index.html" class="btn-primary">🏠 Kembali ke Home</a>
  </div>
</body>
</html>
