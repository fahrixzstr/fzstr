<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reset Password - FahriXZ Store">
  <title>Reset Password - FahriXZ Store</title>

  <link rel="stylesheet" href="css/auth.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
</head>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <h1>🔑 Reset Password</h1>
      <p>Masukkan email untuk reset password</p>
      
      <form id="resetForm">
        <input type="email" id="resetEmail" placeholder="Email" required>
        <button type="submit" class="btn-primary">Kirim Reset Link</button>
      </form>
      
      <div class="auth-links">
        <a href="login.html">← Kembali ke Login</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDjSUSuUWl6GOh_vJ-GnYV1tvguv0_pRXI",
      authDomain: "fahrixzstore.firebaseapp.com",
      projectId: "fahrixzstore",
      appId: "1:1070736619563:web:735cdd57d5c90373e1526e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('resetEmail').value;

      try {
        await sendPasswordResetEmail(auth, email);
        alert('Link reset password dikirim ke email!');
        window.location.href = 'login.html';
      } catch (error) {
        alert('Gagal: ' + error.message);
      }
    });
  </script>
</body>
</html>
