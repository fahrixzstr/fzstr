<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="User Dashboard - FahriXZ Store">
  <title>Dashboard - FahriXZ Store</title>

  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
</head>

<body>
  <div class="dashboard">
    <aside class="sidebar">
      <h2>⚡ FahriXZ</h2>
      <a href="#" class="active">🏠 Dashboard</a>
      <a href="history.html">📦 Order Saya</a>
      <a href="wallet.html">💰 Wallet</a>
      <a href="voucher.html">🎟 Voucher</a>
      <a href="wishlist.html">❤️ Wishlist</a>
      <a href="settings.html">⚙ Pengaturan</a>
      <button onclick="logoutUser()">Logout</button>
    </aside>

    <main class="content">
      <h1>👋 Selamat Datang</h1>
      
      <div id="userProfile" class="profile-box">Loading...</div>

      <div class="stats-grid">
        <div class="stats-card">
          <h2 id="totalOrders">0</h2>
          <p>Total Order</p>
        </div>
        <div class="stats-card">
          <h2>Rp0</h2>
          <p>Saldo Wallet</p>
        </div>
        <div class="stats-card">
          <h2>Free</h2>
          <p>Membership</p>
        </div>
      </div>

      <div class="tracking-box">
        <h2>📦 Tracking Pesanan</h2>
        <div class="track-form">
          <input type="text" id="trackInput" placeholder="Masukkan Order ID">
          <button onclick="trackOrder()">Cek</button>
        </div>
        <div id="trackResult"></div>
      </div>

      <div class="order-box">
        <h2>🛒 Order Saya</h2>
        <div id="orderList"></div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDjSUSuUWl6GOh_vJ-GnYV1tvguv0_pRXI",
      authDomain: "fahrixzstore.firebaseapp.com",
      databaseURL: "https://fahrixzstore-default-rtdb.firebaseio.com",
      projectId: "fahrixzstore"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Check auth
    onAuthStateChanged(auth, user => {
      if (user) {
        document.getElementById('userProfile').innerHTML = `<h2>${user.email}</h2><p>Status: Aktif</p>`;
        loadOrders(user.uid);
      } else {
        window.location.href = 'login.html';
      }
    });

    // Logout
    window.logoutUser = async function() {
      await signOut(auth);
      window.location.href = 'login.html';
    };

    // Load orders
    function loadOrders(uid) {
      const orderRef = ref(db, 'orders');
      onValue(orderRef, snapshot => {
        const data = snapshot.val();
        const list = document.getElementById('orderList');
        if (!data) {
          list.innerHTML = '<p>Belum ada order</p>';
          return;
        }
        
        let html = '';
        let count = 0;
        for (let id in data) {
          count++;
          const item = data[id];
          html += `
            <div class="order-card">
              <h3>${item.product}</h3>
              <p>Order ID: ${item.orderId}</p>
              <p>Status: <span style="color:${item.status === 'Selesai' ? '#22c55e' : '#f59e0b'};">${item.status}</span></p>
            </div>
          `;
        }
        document.getElementById('totalOrders').textContent = count;
        list.innerHTML = html;
      });
    }

    // Track order
    window.trackOrder = function() {
      const orderId = document.getElementById('trackInput').value;
      const result = document.getElementById('trackResult');
      
      if (!orderId) {
        result.innerHTML = '<p>Masukkan Order ID!</p>';
        return;
      }
      
      result.innerHTML = `
        <div class="order-card">
          <h3>${orderId}</h3>
          <div class="tracking-step active">🟡 Pending</div>
          <div class="tracking-step">🔵 Diproses</div>
          <div class="tracking-step">🟢 Selesai</div>
        </div>
      `;
    };
  </script>
</body>
</html>
