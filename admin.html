<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Admin Dashboard - FahriXZ Store">
  <title>Admin Panel - FahriXZ Store</title>

  <link rel="stylesheet" href="css/admin.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  
  <style>
    #splash{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0f;display:flex;justify-content:center;align-items:center;z-index:9999;color:#00d9ff;font-size:1.5rem;}
  </style>
</head>

<body>
  <div id="splash">Loading...</div>

  <div class="admin-dashboard">
    <aside class="admin-sidebar">
      <h2>📋 Admin Panel</h2>
      <nav class="sidebar-menu">
        <a href="#" class="menu-item active">📊 Dashboard</a>
        <a href="#" class="menu-item">📦 Kelola Order</a>
        <a href="#" class="menu-item">🛒 Kelola Produk</a>
        <a href="#" class="menu-item">👥 Kelola User</a>
        <a href="#" class="menu-item">🎟 Voucher</a>
        <a href="#" class="menu-item">📢 Broadcast</a>
        <a href="analytic.html" class="menu-item">📈 Analytics</a>
        <a href="index.html" class="menu-item">🌐 Lihat Web</a>
      </nav>
      <button onclick="logoutAdmin()" class="btn-logout">🚪 Logout</button>
    </aside>

    <main class="admin-content">
      <h1>📊 Dashboard Admin</h1>

      <div class="admin-stats">
        <div class="admin-card">
          <h2 id="totalRevenue">Rp 0</h2>
          <p>Total Pendapatan</p>
        </div>
        <div class="admin-card">
          <h2 id="totalOrders">0</h2>
          <p>Total Order</p>
        </div>
        <div class="admin-card">
          <h2 id="totalUsers">0</h2>
          <p>Total User</p>
        </div>
      </div>

      <div class="admin-actions" style="display:flex;gap:15px;flex-wrap:wrap;margin:30px 0;">
        <button onclick="backupData()" class="btn-action">💾 Backup Data</button>
        <button onclick="exportReport()" class="btn-action">📄 Export Report</button>
        <label class="btn-action">📂 Restore
          <input type="file" accept=".json" onchange="restoreBackup(event)" style="display:none;">
        </label>
      </div>

      <div class="admin-box">
        <h2>🛒 Tambah Produk</h2>
        <form id="addProductForm">
          <input type="text" id="productName" placeholder="Nama Produk" required>
          <input type="number" id="productPrice" placeholder="Harga" required>
          <select id="productCategory" required>
            <option value="">Pilih Kategori</option>
            <option value="ewallet">E-Wallet</option>
            <option value="bank">Bank Digital</option>
            <option value="qris">QRIS</option>
            <option value="streaming">Streaming</option>
            <option value="ai">AI Tools</option>
            <option value="service">Jasa Digital</option>
          </select>
          <button type="submit" class="btn-primary">💾 Simpan</button>
        </form>
      </div>

      <div class="admin-box">
        <h2>📦 Daftar Order</h2>
        <div id="adminOrders">
          <p class="empty-state">Belum ada order</p>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDjSUSuUWl6GOh_vJ-GnYV1tvguv0_pRXI",
      authDomain: "fahrixzstore.firebaseapp.com",
      databaseURL: "https://fahrixzstore-default-rtdb.firebaseio.com",
      projectId: "fahrixzstore",
      storageBucket: "fahrixzstore.firebasestorage.app",
      messagingSenderId: "1070736619563",
      appId: "1:1070736619563:web:735cdd57d5c90373e1526e"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // Check auth
    onAuthStateChanged(auth, user => {
      if (!user) window.location.href = 'login.html';
    });

    // Logout
    window.logoutAdmin = async function() {
      await signOut(auth);
      window.location.href = 'login.html';
    };

    // Load orders
    const orderRef = ref(db, 'orders');
    onValue(orderRef, snapshot => {
      const data = snapshot.val();
      const container = document.getElementById('adminOrders');
      if (!data) return;
      
      let html = '';
      let totalOrders = 0;
      for (let id in data) {
        totalOrders++;
        const item = data[id];
        html += `
          <div class="order-admin-card">
            <h3>${item.product || '-'}</h3>
            <p>Order ID: ${item.orderId}</p>
            <p>Nama: ${item.name}</p>
            <p>WhatsApp: ${item.wa}</p>
            <p>Status: <span class="status-badge" style="background:${item.status === 'Selesai' ? '#22c55e' : '#f59e0b'};color:#000;padding:3px 10px;border-radius:10px;font-size:12px;">${item.status}</span></p>
            <div style="display:flex;gap:10px;margin-top:10px;">
              <button onclick="updateOrderStatus('${id}','Diproses')" style="padding:8px 15px;background:#667eea;color:#fff;border:none;border-radius:8px;cursor:pointer;">Proses</button>
              <button onclick="updateOrderStatus('${id}','Selesai')" style="padding:8px 15px;background:#22c55e;color:#fff;border:none;border-radius:8px;cursor:pointer;">Selesai</button>
              <button onclick="deleteOrder('${id}')" style="padding:8px 15px;background:#ef4444;color:#fff;border:none;border-radius:8px;cursor:pointer;">Hapus</button>
            </div>
          </div>
        `;
      }
      document.getElementById('totalOrders').textContent = totalOrders;
      container.innerHTML = html || '<p class="empty-state">Belum ada order</p>';
    });

    // Update status
    window.updateOrderStatus = async function(id, status) {
      await update(ref(db, 'orders/' + id), { status });
      alert('Status diperbarui!');
    };

    // Delete order
    window.deleteOrder = async function(id) {
      if (confirm('Hapus order ini?')) {
        await remove(ref(db, 'orders/' + id));
        alert('Dihapus!');
      }
    };

    // Save product
    document.getElementById('addProductForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('productName').value;
      const price = document.getElementById('productPrice').value;
      const category = document.getElementById('productCategory').value;
      
      await push(ref(db, 'products'), { name, price, category, createdAt: Date.now() });
      alert('Produk disimpan!');
      e.target.reset();
    });

    // Hide splash
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => document.getElementById('splash').style.display = 'none', 1000);
    });
  </script>
</body>
</html>
